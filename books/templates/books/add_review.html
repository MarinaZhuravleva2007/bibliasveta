{% extends 'base.html' %}

{% block title %}Новый отзыв{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card">
            <div class="card-header" style="background-color: #6f42c1; color: white;">
                <h3 class="mb-0"><i class="bi bi-star"></i> Новый отзыв</h3>
            </div>
            <div class="card-body">
                <h4>{{ book.title }}</h4>
                <p class="text-muted">{{ book.get_authors_display }}</p>
                <hr>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Оценка:</label>
                        {{ form.rating }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Комментарий:</label>
                        {{ form.comment }}
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-purple">
                            <i class="bi bi-save"></i> Опубликовать
                        </button>
                        <a href="{% url 'books:book_detail' book.pk %}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Назад
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
